# ref_constable — Renewable Energy Foundation (Constable) 2025-05-01
# ============================================================================
# Primary RO benchmark anchor per D-13 / D-14 (Phase 5 RO-06).
# HARD BLOCK: 3.0% tolerance is a public numerical-accuracy commitment.
# Investigate root cause BEFORE adjusting tolerance if reconciliation fails.
#
# Source: REF "UK Renewable Electricity Subsidy Totals: 2002 to the Present Day" (Constable, 2025-05-01)
# Blog: https://www.ref.org.uk/ref-blog/390-uk-renewable-electricity-subsidy-totals-2002-to-the-present-day
# PDF:  https://www.ref.org.uk/attachments/article/390/renewables.subsidies.01.05.25.pdf
# Retrieved: 2026-04-22 (researcher in 05-RESEARCH.md §5; PDF ~372KB, Table 1 transcribed from HTML rendering)
# Basis: Scheme Year (April-March) aggregate RO cost, £bn nominal;
#        GB-only; includes cofiring + mutualisation; EXCLUDES NIRO.
# Scope alignment with pipeline D-12 headline: matches (GB-only all-in incl cofiring + mutualisation).
# CY-vs-SY note: D-07 pipeline plots by calendar year; annual aggregates align with SY within ±1%
#                reporting precision for cumulative measures.
# Turver note: Turver substack SY20 = £6.4bn (matches REF 2021); Turver SY21 = £6.8bn (REF = £6.4bn,
#              ~6% drift — Turver reflects later Ofgem Annual Report snapshot; REF is earlier cut).
# Tolerance: REF_TOLERANCE_PCT = 3.0 (D-14 hard block)
#
# Audit 2026-04-23: initial transcription from REF Table 1 (22 years 2002-2023 verbatim per
#   RESEARCH §5 lines 1101-1122). Phase 5 Plan 05-09.
#
#   Unattended-execution posture (Plan 05-09 Task 2):
#   Derived RO Parquet currently flows from Plan 05-01 Option-D stubs (zero-row output).
#   Under stub conditions `ro_annual_totals_gbp_bn` returns `{}` and the parametrised
#   reconciliation raises "no pipeline data for year N" for every REF year — which
#   is itself a divergence-class event under D-14. The test's xfail-via-sentinel
#   escape hatch activates: `.planning/phases/05-ro-module/05-09-DIVERGENCE.md`
#   documents the zero-row condition for Plan 05-13 Task 4 review. When Plan 05-13
#   replaces the Option-D stubs with real Ofgem data and `schemes.ro.rebuild_derived()`
#   emits non-stub `ro_cost_gbp`, delete 05-09-DIVERGENCE.md to re-arm the hard block.
