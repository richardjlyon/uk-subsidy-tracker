# Benchmark reconciliation fixtures for `tests/test_benchmarks.py`.
#
# Each top-level key is a source category. Each entry carries full
# provenance: year, value in £bn, upstream URL, retrieval date, notes
# (scheme-subset / CPI / FY-vs-CY rationale), and per-entry tolerance.
#
# `lccc_self:` is the MANDATORY floor per CONTEXT D-10 (0.1% tolerance) —
# our pipeline reads LCCC raw data, so divergence here is a pipeline bug,
# not a methodology divergence.
#
# External anchor sections (ofgem_transparency, obr_efo, desnz_energy_trends,
# hoc_library, nao_audit) are present-but-may-be-empty per D-11 fallback
# posture. Populate as regulator-native figures are transcribed.
#
# `ref_constable:` is the PRIMARY RO benchmark anchor per CONTEXT D-13 /
# D-14 (Phase 5 RO-06). HARD BLOCK at 3.0% — D-11 skip-fallback does NOT
# apply; divergence drives investigation + `05-09-DIVERGENCE.md` audit
# for Plan 05-13 Task 4 review, never silent skip.

# lccc_self posture (CONTEXT D-10 + D-11 fallback):
#   - If the LCCC ARA 2024/25 PDF figure can be transcribed cleanly, populate
#     with concrete entries carrying all D-05 fields (year, value_gbp_bn,
#     url, retrieved_on, notes, tolerance_pct: 0.1).
#   - Otherwise, ship `lccc_self: []` per D-11 fallback. A wrong floor is
#     worse than no floor — D-10 forbids pinning the pipeline to a guess.
#   - When empty, `tests/test_benchmarks.py::test_lccc_self_reconciliation_floor`
#     skips cleanly with a D-11-citing reason string (see Task 2).
#   - Follow-up to land the transcribed figure is filed in Phase 3/4.
#
# Audit: 2026-04-22 — Phase 4 Plan 06 (Disposition C).
#   Phase 4 Plan 06 re-examined the D-11 posture per CONTEXT D-26. The LCCC
#   ARA 2024/25 PDF (https://www.lowcarboncontracts.uk/documents/293/LCCC_ARA_24-25_11.pdf)
#   reports FY Apr 2024 – Mar 2025 without a quarterly breakdown that
#   reconstructs calendar-year 2024 cleanly. A 0.1% floor tolerance against
#   an FY-vs-CY mismatch (RESEARCH Pitfall 7) is strictly worse than no
#   floor per Phase 2 D-10/D-11 — a wrong floor silently pins the pipeline
#   to a misaligned reference. Fallback preserved with explicit evidence;
#   awaiting a future LCCC quarterly publication that supplies a clean CY
#   aggregate, at which point this entry will be populated at 0.1%
#   tolerance. Matches the Plan 06 Task 3 `<autonomous_fallback>` clause.
lccc_self: []

ofgem_transparency: []

obr_efo:
  # Secondary reporting cites OBR EFO November 2025 financial-year 2024/25
  # CfD = £2.3bn. Calendar-year translation needs quarterly breakdown from
  # the supplementary fiscal tables. Populate when transcribed; until then,
  # this section is empty (D-11 fallback).
  []

