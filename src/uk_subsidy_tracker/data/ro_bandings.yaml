# The Renewables Obligation Order 2009 (SI 2009/785) and amendment SIs
# (SI 2011/2704, SI 2013/768, SI 2015/920, SI 2016/745, SI 2017/1084).
#
# Per CONTEXT D-01 the authoritative rocs_issued source is Ofgem's published
# ROCs_Issued column; this YAML table is an AUDIT CROSS-CHECK consumed by
# schemes/ro/cost_model.py per D-04 Check 1.
#
# NIRO entries (country: "NI") are [ASSUMED] per 05-RESEARCH.md section 7 (and the
# 05-RESEARCH.md section 3 note that NIROC bandings require Utility Regulator NI
# verification). Every NI entry is flagged with "[ASSUMED]" in its "basis" field for
# grep-discoverability until a Plan 05-13 follow-up transcribes the NIROC primary
# source.
#
# Grandfathering rule (REF "Notes", pre-banding 1 ROC/MWh rule): projects accredited
# before 11 July 2006 receive 1 ROC/MWh regardless of their technology's banded rate.
# Encoded here as explicit grandfathered=true entries; RoBandingTable.lookup() short-
# circuits to these rows when commissioning_date < 2006-07-11.
#
# Audit log:
#   2026-04-22 - Initial transcription from REF Table 1 (05-02 Task 1).

