# Ofgem RO Annual Report XLSX dataset companions (SY18-SY23).
#
# Inventory verified 2026-04-24 in commit b934492 (CONTEXT.md SY17-SY23 discovery section).
# SY17 (2018-19) ships PDF-only — deferred per Phase 05.2 revision_decisions.sy17_disposition.
# URLs containing spaces / parens are quoted; requests.get URL-encodes at fetch time.
#
# Provenance:
#   source:       Ofgem-published XLSX dataset companions to RO annual reports (per-publication URLs).
#   url:          (per-entry below)
#   basis:        Each XLSX is the canonical machine-readable companion to that scheme year's annual report PDF.
#   retrieved_on: 2026-04-24
#   next_audit:   when Ofgem publishes SY24 annual report (~2027 Q1) or any prior URL drops to 4xx.

reports:
  - scheme_year: SY18
    period: "2019-20"
    url: "https://www.ofgem.gov.uk/sites/default/files/docs/2021/03/ro_annual_report_data_2019-20.xlsx"
    local_filename: "ro_annual_report_data_2019-20.xlsx"
    expected_min_size_bytes: 50000
    notes: "Ofgem RO Annual Report 2019-20 dataset companion (XLSX, ~89 KB)"

