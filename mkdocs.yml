# MkDocs Configuration for UK Renewable Subsidy Tracker
#
# IMPORTANT: Before building/serving docs, generate charts:
#   uv run python -m uk_subsidy_tracker.plotting
# This populates docs/charts/html/ with chart files (ignored by git)
#   uv run mkdocs gh-deploy
# This updates the GitHub Pages site

site_name: UK Renewable Subsidy Tracker
site_url: https://richardjlyon.github.io/uk-subsidy-tracker/
site_description: Independent, open, data-driven audit of UK renewable electricity subsidy costs
site_author: Richard Lyon

# Repository
repo_name: uk-subsidy-tracker
repo_url: https://github.com/richardjlyon/uk-subsidy-tracker

# Theme
theme:
  name: material
  locale: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips
    - toc.integrate
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

# Validation — --strict gate teeth (RESEARCH §3, required for TRIAGE-04)
validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: warn
    unrecognized_links: info

# Navigation
nav:
  - Home: index.md
  - Cost:
      - themes/cost/index.md
      - CfD dynamics: themes/cost/cfd-dynamics.md
      - CfD vs gas cost: themes/cost/cfd-vs-gas-cost.md
      - Remaining obligations: themes/cost/remaining-obligations.md
      - Methodology: themes/cost/methodology.md
  - Recipients:
      - themes/recipients/index.md
      - Lorenz curve: themes/recipients/lorenz.md
      - Payments by technology: themes/recipients/cfd-payments-by-category.md
      - Methodology: themes/recipients/methodology.md
  - Efficiency:
      - themes/efficiency/index.md
      - Subsidy per tonne CO₂ avoided: themes/efficiency/subsidy-per-avoided-co2-tonne.md
      - Methodology: themes/efficiency/methodology.md
  - Cannibalisation:
      - themes/cannibalisation/index.md
      - Capture ratio: themes/cannibalisation/capture-ratio.md
      - Methodology: themes/cannibalisation/methodology.md
  - Reliability:
      - themes/reliability/index.md
      - Seasonal capacity factor: themes/reliability/capacity-factor-seasonal.md
      - Generation heatmap: themes/reliability/generation-heatmap.md
      - Rolling minimum: themes/reliability/rolling-minimum.md
      - Methodology: themes/reliability/methodology.md
  - Schemes:
      - Overview: schemes/index.md
      - Renewables Obligation (RO): schemes/ro.md
  - Data: data/index.md
  - Methodology:
      - Gas counterfactual: methodology/gas-counterfactual.md
  - About:
      - Corrections: about/corrections.md
      - Citation: about/citation.md

# Markdown extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Plugins
plugins:
  - search

# Extra
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/richardjlyon/uk-subsidy-tracker

# Copyright
copyright: Copyright &copy; 2026 Richard Lyon
