# MkDocs Configuration for UK Renewable Subsidy Tracker
#
# IMPORTANT: Before building/serving docs, generate charts:
#   uv run python -m uk_subsidy_tracker.plotting
# This populates docs/charts/html/ with chart files (ignored by git)
#   uv run mkdocs gh-deploy
# This updates the GitHub Pages site

site_name: UK Renewable Subsidy Tracker
site_url: https://richardjlyon.github.io/uk-subsidy-tracker/
site_description: Independent, open, data-driven audit of UK renewable electricity subsidy costs
site_author: Richard Lyon

# Repository
repo_name: uk-subsidy-tracker
repo_url: https://github.com/richardjlyon/uk-subsidy-tracker

# Theme
theme:
  name: material
  locale: en
  features:
    - navigation.tabs
    - navigation.sections
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

# Navigation
nav:
  - Home: index.md
  - Charts:
      - Overview: charts/index.md
      - CfD Dynamics: charts/subsidy/cfd-dynamics.md
      - CfD vs Gas Cost: charts/subsidy/cfd-vs-gas-cost.md
      - Remaining Obligations: charts/subsidy/remaining-obligations.md
  - Gas Counterfactual: methodology/gas-counterfactual.md
  - About:
      - Corrections: about/corrections.md
      - Citation: about/citation.md

# Markdown extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Plugins
plugins:
  - search

# Extra
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/richardjlyon/uk-subsidy-tracker

# Copyright
copyright: Copyright &copy; 2026 Richard Lyon
